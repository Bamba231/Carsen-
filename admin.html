<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CARSEN | Dashboard Administrateur</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #e63946;
            --primary-hover: #ff4d5a;
            --bg: #050505;
            --surface: rgba(25, 25, 25, 0.6);
            --surface-hover: rgba(35, 35, 35, 0.8);
            --text: #ffffff;
            --text-muted: #888888;
            --border: rgba(255, 255, 255, 0.05);
            --font-display: 'Outfit', sans-serif;
            --font-body: 'Outfit', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-body);
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            background-image:
                radial-gradient(circle at 10% 20%, rgba(230, 57, 70, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(230, 57, 70, 0.05) 0%, transparent 40%);
        }


        #portail-logique {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .boite-connexion {
            background: rgba(20, 20, 20, 0.8);
            backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid var(--border);
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        .boite-connexion h1 {
            font-family: var(--font-display);
            font-size: 2rem;
            margin-bottom: 30px;
            text-align: center;
            color: var(--text);
        }

        .boite-connexion h1 span {
            color: var(--primary);
        }

        .groupe-formulaire-admin {
            margin-bottom: 20px;
        }

        .groupe-formulaire-admin label {
            display: block;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .entree-texte-design {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border);
            color: white;
            padding: 15px;
            border-radius: 10px;
            font-family: var(--font-body);
            font-size: 1rem;
            transition: all 0.3s;
        }

        .entree-texte-design:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(0, 0, 0, 0.5);
            box-shadow: 0 0 15px rgba(230, 57, 70, 0.2);
        }

        .bouton-lumineux {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 700;
            font-family: var(--font-display);
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .bouton-lumineux:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(230, 57, 70, 0.3);
        }


        .barre-laterale {
            width: 280px;
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--border);
            padding: 30px;
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
        }

        .marque-admin {
            font-family: var(--font-display);
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 50px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .marque-admin i {
            color: var(--primary);
        }

        .element-navigation {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px;
            border-radius: 12px;
            color: var(--text-muted);
            text-decoration: none;
            transition: all 0.3s;
            font-weight: 500;
            margin-bottom: 10px;
            cursor: pointer;
        }

        .element-navigation:hover,
        .element-navigation.active {
            background: var(--surface);
            color: var(--primary);
        }

        .element-navigation i {
            font-size: 1.2rem;
        }

        .contenu-principal {
            margin-left: 280px;
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            height: 100vh;
        }

        .entete-tableau {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .entete-tableau h2 {
            font-family: var(--font-display);
            font-size: 2.5rem;
            font-weight: 700;
        }

        .section-vue {
            display: none;
            animation: fadeIn 0.4s ease;
        }

        .section-vue.actif {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }


        .grille-voitures {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 30px;
        }

        .carte-voiture-admin {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.3s;
            position: relative;
        }

        .carte-voiture-admin:hover {
            transform: translateY(-5px);
            border-color: rgba(230, 57, 70, 0.3);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.4);
        }

        .img-voiture-admin {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .info-voiture-admin {
            padding: 20px;
        }

        .titre-voiture-admin {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
        }

        .prix-voiture-admin {
            color: var(--primary);
            font-family: var(--font-display);
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 15px;
        }

        .actions-voiture-admin {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .bouton-icone {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .bouton-modifier {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .bouton-modifier:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .bouton-supprimer {
            background: rgba(230, 57, 70, 0.1);
            color: var(--primary);
        }

        .bouton-supprimer:hover {
            background: var(--primary);
            color: white;
        }


        .grille-formulaire {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .formulaire-plein {
            grid-column: span 2;
        }

        .zone-telechargement {
            border: 2px dashed var(--border);
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: rgba(0, 0, 0, 0.2);
        }

        .zone-telechargement:hover {
            border-color: var(--primary);
            background: rgba(230, 57, 70, 0.05);
        }

        .zone-telechargement i {
            font-size: 3rem;
            color: var(--primary);
            margin-bottom: 15px;
        }

        .zone-telechargement p {
            color: var(--text-muted);
        }

        .notification-toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--primary);
            color: white;
            padding: 15px 25px;
            border-radius: 10px;
            font-weight: 600;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 2000;
            display: flex;
            align-items: center;
            gap: 10px;
            font-family: var(--font-display);
            box-shadow: 0 10px 20px rgba(230, 57, 70, 0.3);
        }

        .notification-toast.afficher {
            transform: translateY(0);
            opacity: 1;
        }

        .entete-mobile-admin {
            display: none;
        }

        .btn-fermer-sidebar {
            display: none;
            cursor: pointer;
        }


        @media (max-width: 1024px) {
            .entete-mobile-admin {
                display: flex;
                justify-content: flex-end;
                align-items: flex-start;
                padding: 15px 20px;
                background: rgba(10, 10, 10, 0.9);
                font-family: var(--font-display);
                font-size: 1.5rem;
                font-weight: 700;
                cursor: pointer;
                border-bottom: 1px solid var(--border);
            }

            .principal-admin {
                display: block;
            }

            .barre-laterale {
                position: fixed;
                left: -100%;
                top: 0;
                width: 280px;
                height: 100vh;
                flex-direction: column;
                justify-content: flex-start;
                padding: 30px;
                z-index: 2000;
                transition: left 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            }

            .barre-laterale.ouverte {
                left: 0;
            }

            .btn-fermer-sidebar {
                display: block;
                color: var(--primary);
                font-size: 1.2rem;
            }

            .marque-admin {
                justify-content: space-between;
                width: 100%;
                margin-bottom: 40px;
            }

            .element-navigation {
                margin: 0 0 10px 0;
                padding: 15px;
            }

            .contenu-principal {
                margin-left: 0;
                padding: 20px;
                height: auto;
            }
        }

        @media (max-width: 768px) {
            .entete-tableau {
                flex-direction: column;
                align-items: flex-start;
                gap: 15px;
            }

            .bouton-admin {
                width: 100%;
                text-align: center;
            }

            .grille-voitures {
                grid-template-columns: 1fr;
                gap: 15px;
            }

            .carte-voiture-admin {
                width: 100%;
                overflow: hidden;
            }

            .img-voiture-admin {
                height: 180px;
            }
        }
    </style>
</head>

<body>


    <div id="portail-logique">
        <div class="boite-connexion">
            <h1> <span>ADMIN</span></h1>
            <form id="formulaire-connexion-admin">
                <div class="groupe-formulaire-admin">
                    <label>Identifiant</label>
                    <input type="text" id="id-connexion" class="entree-texte-design" required>
                </div>
                <div class="groupe-formulaire-admin">
                    <label>Mot de passe</label>
                    <input type="password" id="mdp-connexion" class="entree-texte-design" required>
                </div>
                <button type="submit" class="bouton-lumineux">Accéder </button>
            </form>
        </div>
    </div>


    <div class="entete-mobile-admin" onclick="basculerBarreLaterale()">
        <i class="fas fa-bars"></i>
    </div>


    <div class="barre-laterale" id="barre-laterale">
        <div class="marque-admin">
            CARSEN
            <i class="fas fa-times btn-fermer-sidebar" onclick="basculerBarreLaterale()"></i>
        </div>
        <div class="element-navigation actif" onclick="changerVue('vue-liste')">
            <i class="fas fa-car-side"></i> Inventaire
        </div>
        <div class="element-navigation" onclick="changerVue('vue-ajouter')">
            <i class="fas fa-plus"></i> Nouvelle Annonce
        </div>
        <div style="margin-top: auto;">
            <a href="index.html" class="element-navigation">
                <i class="fas fa-external-link-alt"></i> Voir le site
            </a>
            <div class="element-navigation" onclick="deconnexion()" style="color: #e63946;">
                <i class="fas fa-power-off"></i> Déconnexion
            </div>
        </div>
    </div>


    <div class="contenu-principal">


        <div id="vue-liste" class="section-vue actif">
            <div class="entete-tableau">
                <h2>Inventaire des Véhicules</h2>
                <button class="bouton-lumineux" style="width: auto; padding: 12px 25px;"
                    onclick="changerVue('vue-ajouter')">
                    <i class="fas fa-plus"></i> Ajouter
                </button>
            </div>
            <div class="grille-voitures" id="grille-voitures">
            </div>
        </div>


        <div id="vue-ajouter" class="section-vue">
            <div class="entete-tableau">
                <h2 id="titre-formulaire">Créer une Annonce</h2>
            </div>

            <form id="formulaire-voiture"
                style="background: var(--surface); padding: 30px; border-radius: 20px; border: 1px solid var(--border);">
                <div class="grille-formulaire">
                    <div class="groupe-formulaire-admin">
                        <label>Marque</label>
                        <input type="text" id="voiture-marque" class="entree-texte-design" required
                            placeholder="ex: Porsche">
                    </div>
                    <div class="groupe-formulaire-admin">
                        <label>Modèle</label>
                        <input type="text" id="voiture-modele" class="entree-texte-design" required
                            placeholder="ex: 911 GT3">
                    </div>
                    <div class="groupe-formulaire-admin">
                        <label>Année</label>
                        <input type="number" id="voiture-annee" class="entree-texte-design" required
                            placeholder="ex: 2024">
                    </div>
                    <div class="groupe-formulaire-admin">
                        <label>Prix (FCFA)</label>
                        <input type="number" id="prix-voiture-admin" class="entree-texte-design" required
                            placeholder="ex: 120000000">
                    </div>

                    <div class="groupe-formulaire-admin">
                        <label>Moteur</label>
                        <input type="text" id="voiture-moteur" class="entree-texte-design"
                            placeholder="ex: Flat-6 4.0L">
                    </div>
                    <div class="groupe-formulaire-admin">
                        <label>Kilométrage</label>
                        <input type="text" id="voiture-km" class="entree-texte-design" placeholder="ex: 5000 km">
                    </div>
                    <div class="groupe-formulaire-admin">
                        <label>Transmission</label>
                        <select id="voiture-trans" class="entree-texte-design">
                            <option value="Automatique">Automatique</option>
                            <option value="Manuelle">Manuelle</option>
                            <option value="Séquentielle">Séquentielle</option>
                        </select>
                    </div>
                    <div class="groupe-formulaire-admin">
                        <label>Carburant</label>
                        <select id="voiture-carburant" class="entree-texte-design">
                            <option value="Essence">Essence</option>
                            <option value="Diesel">Diesel</option>
                            <option value="Hybride">Hybride</option>
                            <option value="Electrique">Electrique</option>
                        </select>
                    </div>

                    <div class="groupe-formulaire-admin formulaire-plein">
                        <label>Photos du Véhicule (Max 5)</label>
                        <label class="zone-telechargement" for="voiture-images">
                            <i class="fas fa-cloud-upload-alt"></i>
                            <p>Cliquez ou glissez vos photos ici</p>
                            <p style="font-size: 0.8rem; margin-top: 10px; color: #555;">(Laissez vide pour conserver
                                les photos lors d'une modification)</p>
                            <input type="file" id="voiture-images" multiple accept="image/*" style="display: none;">
                        </label>
                        <div id="apercu-telechargement"
                            style="display: flex; gap: 10px; margin-top: 15px; overflow-x: auto;">
                        </div>
                    </div>
                </div>

                <div class="groupe-formulaire-admin" style="margin-top: 30px;">
                    <button type="submit" class="bouton-lumineux" id="btn-soumettre-voiture">
                        <i class="fas fa-paper-plane"></i> Publier l'Annonce
                    </button>
                </div>
            </form>
        </div>

    </div>


    <div class="notification-toast" id="notification-toast">
        <i class="fas fa-check-circle"></i> <span id="message-toast">Action réussie</span>
    </div>

    <script src="cars-data.js"></script>
    <script src="admin.js"></script>
    <script>
        function basculerBarreLaterale() {
            document.getElementById('barre-laterale').classList.toggle('ouverte');
        }
    </script>
</body>

</html>
